# Umami analytics for analytics.flndrn.com
# Deployed via Dokploy as a Compose service in the `flndrn` project.
# Routing handled by Dokploy/Traefik via the dokploy-network attachment.
#
# Required env vars (set in Dokploy's Environment tab — see .env.example):
#   DB_PASSWORD  postgres password (generated, never committed)
#   APP_SECRET   umami session-signing secret (generated, never committed)

services:
    umami:
        image: ghcr.io/umami-software/umami:postgresql-latest
        restart: always
        environment:
            DATABASE_URL: postgresql://umami:${DB_PASSWORD}@db:5432/umami
            DATABASE_TYPE: postgresql
            APP_SECRET: ${APP_SECRET}
            DISABLE_TELEMETRY: '1'
        depends_on:
            db:
                condition: service_healthy
        networks:
            - default
            - dokploy-network
        # No `ports:` — Dokploy/Traefik routes to umami:3000 over dokploy-network
        # Internal app port is 3000 (Umami default)

    db:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_DB: umami
            POSTGRES_USER: umami
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - umami-db-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U umami -d umami']
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

volumes:
    umami-db-data:

networks:
    dokploy-network:
        external: true
